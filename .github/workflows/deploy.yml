name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: true
        default: 'both'
        type: choice
        options: [both, frontend, backend]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Setup ───────────────────────────────────────────────────────────────

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.PROD_SSH_HOST }} >> ~/.ssh/known_hosts

      # ─── Backend build & deploy ───────────────────────────────────────────────

      - name: Build backend
        if: ${{ github.event_name == 'push' || inputs.target == 'both' || inputs.target == 'backend' }}
        working-directory: backend
        run: |
          pnpm install --frozen-lockfile
          pnpm exec prisma generate
          pnpm build

      - name: Deploy backend dist
        if: ${{ github.event_name == 'push' || inputs.target == 'both' || inputs.target == 'backend' }}
        run: |
          # Upload compiled dist to server
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            backend/dist/ \
            ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:/root/nakryto/backend/dist/

          # Upload package.json (for production dependencies list)
          scp -i ~/.ssh/id_rsa \
            backend/package.json \
            ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:/root/nakryto/backend/package.json

          # Upload prisma schema (for potential generate in container)
          rsync -az \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            backend/prisma/ \
            ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:/root/nakryto/backend/prisma/

      - name: Restart backend container
        if: ${{ github.event_name == 'push' || inputs.target == 'both' || inputs.target == 'backend' }}
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }} \
            "docker restart nakryto_backend && echo 'Backend restarted'"

      # ─── Frontend build & deploy ──────────────────────────────────────────────

      - name: Build frontend
        if: ${{ github.event_name == 'push' || inputs.target == 'both' || inputs.target == 'frontend' }}
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.PROD_NEXT_PUBLIC_API_URL }}
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Deploy frontend
        if: ${{ github.event_name == 'push' || inputs.target == 'both' || inputs.target == 'frontend' }}
        run: |
          # Upload .next build
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            frontend/.next/ \
            ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:/root/nakryto/frontend/.next/

          # Upload public assets
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            frontend/public/ \
            ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:/root/nakryto/frontend/public/

          # Upload package.json
          scp -i ~/.ssh/id_rsa \
            frontend/package.json \
            ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:/root/nakryto/frontend/package.json

      - name: Restart frontend container
        if: ${{ github.event_name == 'push' || inputs.target == 'both' || inputs.target == 'frontend' }}
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }} \
            "docker restart nakryto_frontend && echo 'Frontend restarted'"

      # ─── Smoke test ───────────────────────────────────────────────────────────

      - name: Smoke test
        run: |
          sleep 10
          curl -f https://nakryto.ru/api/health 2>/dev/null || \
          curl -f https://api.nakryto.ru/api/health 2>/dev/null || \
          echo "Health check skipped (endpoint may not exist)"

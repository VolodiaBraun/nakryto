name: Deploy

on:
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy'
        required: true
        default: 'both'
        type: choice
        options: [both, frontend, backend]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Определяем окружение ─────────────────────────────────────────────────
      - name: Set environment variables
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "ENV=prod" >> $GITHUB_ENV
            echo "DEPLOY_PATH=/opt/nakryto/prod" >> $GITHUB_ENV
            echo "BACKEND_CONTAINER=nakryto_backend" >> $GITHUB_ENV
            echo "FRONTEND_CONTAINER=nakryto_frontend" >> $GITHUB_ENV
            echo "API_URL=https://api.nakryto.ru" >> $GITHUB_ENV
          else
            echo "ENV=staging" >> $GITHUB_ENV
            echo "DEPLOY_PATH=/opt/nakryto/staging" >> $GITHUB_ENV
            echo "BACKEND_CONTAINER=nakryto_staging_backend" >> $GITHUB_ENV
            echo "FRONTEND_CONTAINER=nakryto_staging_frontend" >> $GITHUB_ENV
            echo "API_URL=https://staging.nakryto.ru" >> $GITHUB_ENV
          fi

      # ─── Setup ───────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup SSH
        env:
          PRIVATE_KEY_B64: ${{ secrets.PROD_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$PRIVATE_KEY_B64" | tr -d ' \r\n' | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.PROD_SSH_HOST }} >> ~/.ssh/known_hosts

      # ─── Backend ──────────────────────────────────────────────────────────────
      - name: Build backend
        working-directory: backend
        run: |
          pnpm install --frozen-lockfile
          rm -f tsconfig.build.tsbuildinfo
          pnpm exec prisma generate
          pnpm build

      - name: Deploy backend
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            backend/dist/ \
            ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:${{ env.DEPLOY_PATH }}/backend/dist/

          ssh -i ~/.ssh/id_rsa ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }} \
            "docker restart ${{ env.BACKEND_CONTAINER }} && echo 'Backend restarted'"

      # ─── Frontend ─────────────────────────────────────────────────────────────
      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ env.API_URL }}
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Deploy frontend
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            frontend/.next/ \
            ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:${{ env.DEPLOY_PATH }}/frontend/.next/

          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            frontend/public/ \
            ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:${{ env.DEPLOY_PATH }}/frontend/public/

          ssh -i ~/.ssh/id_rsa ${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }} \
            "docker restart ${{ env.FRONTEND_CONTAINER }} && echo 'Frontend restarted'"

      # ─── Summary ─────────────────────────────────────────────────────────────
      - name: Print result
        run: |
          echo "✅ Deployed to ${{ env.ENV }}"
          if [[ "${{ env.ENV }}" == "prod" ]]; then
            echo "🌐 https://nakryto.ru"
          else
            echo "🧪 https://staging.nakryto.ru"
          fi
